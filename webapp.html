<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamVault</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue-deep:    #020b18;
            --blue-dark:    #050f20;
            --blue-mid:     #0a1f3c;
            --blue-accent:  #1a4fa8;
            --blue-bright:  #2e7fff;
            --blue-glow:    #4d9eff;
            --blue-neon:    #00c3ff;
            --text-primary: #e8f4ff;
            --text-muted:   #6b96c8;
            --glass-bg:     rgba(10, 31, 60, 0.7);
            --glass-border: rgba(46, 127, 255, 0.2);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--blue-deep);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Animated background ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 10%, rgba(26,79,168,0.25) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 80% 80%, rgba(0,195,255,0.12) 0%, transparent 55%),
                radial-gradient(ellipse 40% 40% at 50% 50%, rgba(46,127,255,0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
            animation: bgPulse 8s ease-in-out infinite alternate;
        }

        @keyframes bgPulse {
            from { opacity: .7; }
            to   { opacity: 1; }
        }

        /* ── Grid overlay texture ── */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(46,127,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(46,127,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        /* ── Header / Nav ── */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 0 48px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(2,11,24,0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
        }

        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            letter-spacing: 3px;
            background: linear-gradient(90deg, var(--blue-bright), var(--blue-neon));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
            filter: drop-shadow(0 0 12px rgba(0,195,255,0.4));
        }

        nav { display: flex; gap: 32px; align-items: center; }

        nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: .875rem;
            font-weight: 500;
            letter-spacing: .5px;
            transition: color .25s, text-shadow .25s;
            position: relative;
        }

        nav a::after {
            content: '';
            position: absolute;
            bottom: -4px; left: 0; right: 0;
            height: 2px;
            background: var(--blue-neon);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform .25s;
            border-radius: 2px;
            box-shadow: 0 0 8px var(--blue-neon);
        }

        nav a:hover { color: var(--blue-neon); }
        nav a:hover::after { transform: scaleX(1); }

        .nav-cta {
            background: linear-gradient(135deg, var(--blue-accent), var(--blue-bright));
            color: #fff !important;
            padding: 8px 22px;
            border-radius: 6px;
            font-weight: 600;
            box-shadow: 0 0 20px rgba(46,127,255,0.35);
            transition: box-shadow .25s, transform .2s !important;
        }

        .nav-cta::after { display: none !important; }
        .nav-cta:hover { box-shadow: 0 0 35px rgba(46,127,255,0.6); transform: translateY(-1px); }

        /* ── Hero ── */
        .hero {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 90px 24px 60px;
        }

        .hero-badge {
            display: inline-block;
            background: rgba(46,127,255,0.12);
            border: 1px solid rgba(46,127,255,0.35);
            color: var(--blue-glow);
            font-size: .75rem;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            padding: 6px 20px;
            border-radius: 100px;
            margin-bottom: 28px;
            animation: fadeUp .7s ease both;
        }

        .hero h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(3.5rem, 8vw, 7rem);
            line-height: .95;
            letter-spacing: 2px;
            background: linear-gradient(160deg, #fff 30%, var(--blue-glow) 70%, var(--blue-neon) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: fadeUp .7s .12s ease both;
        }

        .hero p {
            margin-top: 20px;
            font-size: 1.1rem;
            color: var(--text-muted);
            max-width: 480px;
            margin-inline: auto;
            line-height: 1.7;
            animation: fadeUp .7s .22s ease both;
        }

        /* ── Search bar ── */
        .search-wrap {
            position: relative;
            z-index: 1;
            max-width: 500px;
            margin: 40px auto 0;
            animation: fadeUp .7s .32s ease both;
        }

        .search-wrap input {
            width: 100%;
            padding: 14px 52px 14px 20px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            color: var(--text-primary);
            font-family: 'Outfit', sans-serif;
            font-size: .95rem;
            outline: none;
            backdrop-filter: blur(12px);
            transition: border-color .25s, box-shadow .25s;
        }

        .search-wrap input::placeholder { color: var(--text-muted); }
        .search-wrap input:focus {
            border-color: var(--blue-bright);
            box-shadow: 0 0 0 3px rgba(46,127,255,0.15), 0 0 30px rgba(46,127,255,0.15);
        }

        .search-icon {
            position: absolute;
            right: 18px; top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
        }

        /* ── Section label ── */
        .section {
            position: relative;
            z-index: 1;
            padding: 24px 48px 64px;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 36px;
        }

        .section-header h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.9rem;
            letter-spacing: 2px;
            color: var(--text-primary);
        }

        .section-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--glass-border), transparent);
        }

        .section-count {
            font-size: .8rem;
            color: var(--text-muted);
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 4px 12px;
            border-radius: 100px;
        }

        /* ── Card grid ── */
        .card-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 28px;
        }

        /* ── Card ── */
        .card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            overflow: hidden;
            backdrop-filter: blur(16px);
            transition: transform .35s cubic-bezier(.22,1,.36,1), box-shadow .35s, border-color .35s;
            cursor: pointer;
            animation: fadeUp .5s ease both;
            position: relative;
        }

        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(46,127,255,0.08) 0%, transparent 60%);
            opacity: 0;
            transition: opacity .35s;
            pointer-events: none;
            z-index: 1;
        }

        .card:hover {
            transform: translateY(-8px) scale(1.01);
            box-shadow: 0 24px 60px rgba(0,0,0,0.5), 0 0 40px rgba(46,127,255,0.2);
            border-color: rgba(46,127,255,0.45);
        }

        .card:hover::before { opacity: 1; }

        /* ── Video area ── */
        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            background: #020b18;
        }

        .video-container video {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
        }

        /* play overlay */
        .play-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(2,11,24,0.35);
            opacity: 0;
            transition: opacity .3s;
            z-index: 2;
        }

        .card:hover .play-overlay { opacity: 1; }

        .play-btn {
            width: 60px; height: 60px;
            border-radius: 50%;
            background: rgba(46,127,255,0.9);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 0 8px rgba(46,127,255,0.2), 0 0 40px rgba(46,127,255,0.5);
            transform: scale(.85);
            transition: transform .3s cubic-bezier(.22,1,.36,1);
        }

        .card:hover .play-btn { transform: scale(1); }

        /* ── Card badge ── */
        .card-badge {
            position: absolute;
            top: 12px; left: 12px;
            background: rgba(0,195,255,0.15);
            border: 1px solid rgba(0,195,255,0.4);
            color: var(--blue-neon);
            font-size: .65rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 4px 10px;
            border-radius: 4px;
            z-index: 3;
            backdrop-filter: blur(8px);
        }

        /* ── Card body ── */
        .card-body {
            padding: 18px 20px 20px;
        }

        .card-title {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
            line-height: 1.3;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-description {
            font-size: .82rem;
            color: var(--text-muted);
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid rgba(46,127,255,0.1);
        }

        .card-meta {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: .78rem;
            color: var(--text-muted);
        }

        .card-meta svg { color: var(--blue-glow); }

        .watch-btn {
            font-family: 'Outfit', sans-serif;
            font-size: .78rem;
            font-weight: 600;
            letter-spacing: .5px;
            padding: 6px 16px;
            border: none;
            border-radius: 6px;
            background: linear-gradient(135deg, var(--blue-accent), var(--blue-bright));
            color: #fff;
            cursor: pointer;
            box-shadow: 0 0 16px rgba(46,127,255,0.3);
            transition: box-shadow .25s, transform .2s;
        }

        .watch-btn:hover {
            box-shadow: 0 0 28px rgba(46,127,255,0.55);
            transform: translateY(-1px);
        }

        /* ── Empty / loading state ── */
        .state-wrapper {
            grid-column: 1/-1;
            text-align: center;
            padding: 80px 24px;
            color: var(--text-muted);
        }

        .loader {
            width: 48px; height: 48px;
            border: 3px solid rgba(46,127,255,0.2);
            border-top-color: var(--blue-bright);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--blue-deep); }
        ::-webkit-scrollbar-thumb { background: var(--blue-accent); border-radius: 3px; }

        /* ── Animations ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Footer ── */
        footer {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 32px 24px;
            border-top: 1px solid var(--glass-border);
            color: var(--text-muted);
            font-size: .8rem;
        }

        footer span { color: var(--blue-glow); }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            header { padding: 0 20px; }
            nav a:not(.nav-cta) { display: none; }
            .section { padding: 16px 20px 48px; }
            .hero { padding: 60px 20px 40px; }
        }
    </style>
</head>
<body>

    <!-- ── Header ── -->
    <header>
        <div class="logo">StreamVault</div>
        <nav>
            <a href="#">Inicio</a>
            <a href="#">Explorar</a>
            <a href="#">Mi lista</a>
            <a href="#" class="nav-cta">Suscribirse</a>
        </nav>
    </header>

    <!-- ── Hero ── -->
    <section class="hero">
        <div class="hero-badge">✦ Streaming en alta definición</div>
        <h1>Tu cine<br>en casa</h1>
        <p>Descubre miles de películas y series. Transmite cuando quieras, donde quieras.</p>
        <div class="search-wrap">
            <input type="text" id="search-input" placeholder="Buscar películas, series...">
            <svg class="search-icon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
            </svg>
        </div>
    </section>

    <!-- ── Content ── -->
    <section class="section">
        <div class="section-header">
            <h2>Contenido disponible</h2>
            <div class="section-line"></div>
            <div class="section-count" id="count">Cargando…</div>
        </div>
        <div class="card-container" id="video-cards">
            <div class="state-wrapper">
                <div class="loader"></div>
                <p>Cargando contenido…</p>
            </div>
        </div>
    </section>

    <footer>
        Hecho con <span>♥</span> · StreamVault &copy; 2025
    </footer>

    <script>
        const BADGES = ['HD', '4K', 'NUEVO', 'POPULAR', 'EXCLUSIVO'];

        function buildCard(video, index) {
            const card = document.createElement('div');
            card.classList.add('card');
            card.style.animationDelay = `${index * 0.07}s`;

            // badge
            const badge = document.createElement('div');
            badge.classList.add('card-badge');
            badge.textContent = BADGES[index % BADGES.length];

            // video wrapper
            const videoContainer = document.createElement('div');
            videoContainer.classList.add('video-container');

            const videoElement = document.createElement('video');
            videoElement.controls = true;
            videoElement.preload = 'metadata';
            videoElement.onloadedmetadata = function () { this.currentTime = 2; };
            videoElement.src = `http://localhost:8080/stream/with-id/${video.id}`;
            videoElement.poster = `http://localhost:8080/stream/with-id/${video.id}`;

            // play overlay
            const overlay = document.createElement('div');
            overlay.classList.add('play-overlay');
            overlay.innerHTML = `
                <div class="play-btn">
                    <svg width="22" height="22" fill="#fff" viewBox="0 0 24 24">
                        <path d="M8 5v14l11-7z"/>
                    </svg>
                </div>`;
            overlay.addEventListener('click', () => {
                videoElement.paused ? videoElement.play() : videoElement.pause();
            });

            videoContainer.appendChild(videoElement);
            videoContainer.appendChild(overlay);

            // body
            const body = document.createElement('div');
            body.classList.add('card-body');

            const title = document.createElement('div');
            title.classList.add('card-title');
            title.textContent = video.name;

            const desc = document.createElement('div');
            desc.classList.add('card-description');
            desc.textContent = video.description || 'Sin descripción disponible.';

            const footer = document.createElement('div');
            footer.classList.add('card-footer');

            const meta = document.createElement('div');
            meta.classList.add('card-meta');
            meta.innerHTML = `
                <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
                </svg>
                HD`;

            const btn = document.createElement('button');
            btn.classList.add('watch-btn');
            btn.textContent = 'Ver ahora';
            btn.addEventListener('click', () => videoElement.play());

            footer.appendChild(meta);
            footer.appendChild(btn);
            body.appendChild(title);
            body.appendChild(desc);
            body.appendChild(footer);

            card.appendChild(badge);
            card.appendChild(videoContainer);
            card.appendChild(body);

            return card;
        }

        let allVideos = [];

        function renderCards(videos) {
            const container = document.getElementById('video-cards');
            container.innerHTML = '';
            if (!videos.length) {
                container.innerHTML = '<div class="state-wrapper"><p>No se encontraron resultados.</p></div>';
                return;
            }
            videos.forEach((video, i) => container.appendChild(buildCard(video, i)));
        }

        // Search filter
        document.getElementById('search-input').addEventListener('input', function () {
            const q = this.value.toLowerCase();
            const filtered = allVideos.filter(v =>
                v.name.toLowerCase().includes(q) ||
                (v.description || '').toLowerCase().includes(q)
            );
            document.getElementById('count').textContent = `${filtered.length} títulos`;
            renderCards(filtered);
        });

        // Fetch
        fetch('http://localhost:8080/movie-info/list')
            .then(r => r.json())
            .then(data => {
                allVideos = data;
                document.getElementById('count').textContent = `${data.length} títulos`;
                renderCards(data);
            })
            .catch(() => {
                // Demo fallback — remove in production
                allVideos = [
                    { id: 1, name: 'Interestelar', description: 'Un viaje épico a través del espacio y el tiempo más allá de nuestra galaxia.' },
                    { id: 2, name: 'Dune: Parte Dos', description: 'Paul Atreides une fuerzas con Chani y los Fremen para vengar a su familia.' },
                    { id: 3, name: 'Oppenheimer', description: 'La historia del hombre que cambió el curso de la historia con una sola detonación.' },
                    { id: 4, name: 'Blade Runner 2049', description: 'Un nuevo oficial de policía descubre un secreto que podría hundir a la sociedad.' },
                    { id: 5, name: 'The Matrix Resurrections', description: 'El regreso a una realidad profundamente familiar que esconde la verdad.' },
                    { id: 6, name: 'Avatar: El camino del agua', description: 'Jake Sully y Neytiri protegen a su familia mientras enfrentan una antigua amenaza.' },
                ];
                document.getElementById('count').textContent = `${allVideos.length} títulos (demo)`;
                renderCards(allVideos);
            });
    </script>
</body>
</html>
